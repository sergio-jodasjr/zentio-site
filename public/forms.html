<!doctype html>
<html lang="pt-br">
  <head><meta charset="utf-8"><title>Netlify Forms</title></head>
  <body>
    <!-- This file exists only so Netlify can detect the form at build time -->
    <form name="zentio-contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="zentio-contact" />
      <p style="display:none">
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>

      <input name="name" />
      <input name="company" />
      <input name="email" type="email" />
      <input name="whatsapp" />
      <input name="country" />
      <textarea name="message"></textarea>

      <button type="submit">Send</button>
    </form>
  </body>
</html>
